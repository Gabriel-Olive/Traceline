<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TraceLine CAD 2D</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="toolbar">
        <div class="group">
            <div>
                <span class="label">Desenhar</span>
                <button id="btn-line" class="active" onclick="setMode('line')">Linha</button>
                <button id="btn-polyline" onclick="setMode('polyline')">Polyline</button>
                <button id="btn-circle" onclick="setMode('circle')">Círculo</button>
                <button id="btn-arc" onclick="setMode('arc')">Arco</button>
            </div>
        </div>

        <div class="group">
            <div>
                <span class="label">Modificar</span>
                <button id="btn-move" onclick="setMode('move')">Move</button>
                <button id="btn-copy" onclick="setMode('copy')">Copy</button>
                <button id="btn-rotate" onclick="setMode('rotate')">Rotate</button>
                <button id="btn-offset" onclick="setMode('offset')">Offset</button>
                <button id="btn-trim" onclick="setMode('trim')">Trim</button>
                <button id="btn-extend" onclick="setMode('extend')">Extend</button>
                <button id="btn-mirror" onclick="setMode('mirror')">Mirror</button>
                <button id="btn-delete" onclick="setMode('delete')" style="background-color: #a23333;">Delete</button>
            </div>
        </div>

        <button onclick="clearSelection()" style="background-color: #555;">Limpar Seleção</button>
        <button onclick="clearCanvas()" style="background-color: #222;">Limpar Tudo</button>
        <button onclick="saveDrawing()" style="background-color: #1a5a1a;">💾 Salvar</button>
        <button onclick="loadDrawing()" style="background-color: #1a3a5a;">📂 Carregar</button>
    </div>

    <div id="canvas-container">
        <canvas id="cadCanvas"></canvas>
    </div>

    <div id="command-prompt" onclick="focusPrompt()">
        <div id="prompt-history"></div>
        <div id="prompt-message"></div>
        <div id="prompt-input-line">
            <span id="prompt-prefix">Comando:</span>
            <input type="text" id="prompt-input" autocomplete="off" spellcheck="false">
        </div>
    </div>

    <div id="statusbar">
        <div>Cursor: <span id="coord-display">X: 0, Y: 0</span></div>
        <div>Modo Atual: <span id="mode-display" style="color:#0098ff; font-weight:bold;">LINHA</span></div>
        <div>Selecionados: <span id="select-count" style="color:#ffaa00; font-weight:bold;">0</span></div>
    </div>

    <!-- Load modules in order -->
    <script src="js/shapes.js"></script>
    <script src="js/core.js"></script>
    <script src="js/otrack.js"></script>
    <script src="js/prompt.js"></script>
    <script src="js/operations.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/mouse.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
