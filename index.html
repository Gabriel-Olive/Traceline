            else if (currentMode === 'trim') inst = "Clique nas pontas sobressalentes para cortar.";
            else if (currentMode === 'offset') inst = `Digite a distância e dê Enter [Atual: ${offsetDistance}]. Clique na linha.`;
            else if (currentMode === 'delete') inst = "Clique no objeto ou abra uma caixa de seleção para apagar.";
            else if (currentMode === 'move') {
                if (selectionPhase === "select") inst = `[Fase 1: Seleção] Selecione os objetos desejados. Quando terminar, aperte ENTER.`;
                else if (selectionPhase === "basepoint") inst = `[Fase 2: Origem] Clique em cima de um SNAP do objeto para usar como PONTO BASE.`;
                else inst = "Mova o mouse e clique no ponto de DESTINO (ou digite o tamanho + Enter).";
            }
            else if (currentMode === 'mirror') {
                if (selectionPhase === "select") inst = `[Mirror 1/3] Selecione os objetos a espelhar e aperte ENTER.`;
                else if (selectionPhase === "axis1") inst = `[Mirror 2/3] Clique no 1º ponto do EIXO DE ESPELHAMENTO.`;
                else inst = `[Mirror 3/3] Clique no 2º ponto do eixo para concluir o espelhamento.`;
            }
            else if (currentMode === 'copy') {
                if (selectionPhase === "select") inst = `[Copy 1/2] Selecione os objetos a copiar e aperte ENTER.`;
                else inst = `Clique no ponto BASE e depois no DESTINO (cliques consecutivos = múltiplas cópias).`;
            }
            else if (currentMode === 'rotate') {
                if (selectionPhase === "select") inst = `[Rotate 1/2] Selecione os objetos a rotacionar e aperte ENTER.`;
                else inst = `Clique no centro de rotação e depois na direção final (ou digite graus + Enter).`;
            }
            else if (currentMode === 'extend') {
                if (extendPhase === "boundary") inst = `[Extend 1/2] Selecione os objetos LIMITE e aperte ENTER.`;
                else inst = `[Extend 2/2] Clique nos objetos a estender (perto da ponta a estender).`;
            }
            
            document.getElementById('instruction-display').innerText = inst;
            document.getElementById('prompt-label').innerText = lbl;
        }

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect(); screenMousePos = new Point(e.clientX - rect.left, e.clientY - rect.top);
            if (isPanning) { panX = e.clientX - startPan.x; panY = e.clientY - startPan.y; drawEverything(); return; }
            processCalculatedPoint();
            document.getElementById('coord-display').innerText = `X: ${Math.round(computedPt.x)}, Y: ${Math.round(-computedPt.y)}`;
            drawEverything();
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault(); const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left; const mouseY = e.clientY - rect.top;
            const modelPtBefore = screenToModel(new Point(mouseX, mouseY));
            if (e.deltaY < 0) zoom *= 1.1; else zoom /= 1.1;
            zoom = Math.max(0.05, Math.min(zoom, 50));
            panX = mouseX - modelPtBefore.x * zoom; panY = mouseY - modelPtBefore.y * zoom;
            processCalculatedPoint(); drawEverything();
        }, { passive: false });

        function drawEverything() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save(); ctx.translate(panX, panY); ctx.scale(zoom, zoom);

            // ORIGEM
            ctx.strokeStyle = '#ff3333'; ctx.lineWidth = 1 / zoom; ctx.beginPath(); ctx.moveTo(0, -30/zoom); ctx.lineTo(0, 30/zoom); ctx.stroke();
            ctx.strokeStyle = '#33ff33'; ctx.lineWidth = 1 / zoom; ctx.beginPath(); ctx.moveTo(-30/zoom, 0); ctx.lineTo(30/zoom, 0); ctx.stroke();
            
            // GEOMETRIAS
            shapes.forEach(shape => {
                ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2 / zoom;
                let isSel = selectedShapes.some(sel => sel.id === shape.id);
                shape.draw(ctx, isSel);
            });

            // ELÁSTICOS DE DESENHO
            ctx.strokeStyle = '#aaaaaa'; ctx.lineWidth = 1 / zoom; ctx.setLineDash([4 / zoom, 4 / zoom]);
            if (currentPoints.length > 0) {
                if (currentMode === 'line') {
                    ctx.beginPath(); ctx.moveTo(currentPoints[0].x, currentPoints[0].y); ctx.lineTo(computedPt.x, computedPt.y); ctx.stroke();
                } else if (currentMode === 'polyline') {
                    ctx.beginPath(); ctx.moveTo(currentPoints[0].x, currentPoints[0].y);
                    for(let i=1; i<currentPoints.length; i++) ctx.lineTo(currentPoints[i].x, currentPoints[i].y);
                    ctx.lineTo(computedPt.x, computedPt.y); ctx.stroke();
                } else if (currentMode === 'circle') {
                    ctx.beginPath(); ctx.arc(currentPoints[0].x, currentPoints[0].y, currentPoints[0].distanceTo(computedPt), 0, 2*Math.PI); ctx.stroke();
                } else if (currentMode === 'arc') {
                    // Preview: ponto inicial já definido
                    if (currentPoints.length >= 1) {
                        // Marca o ponto inicial com um X
                        ctx.save(); ctx.setLineDash([]);
                        ctx.strokeStyle = '#ff9900'; ctx.lineWidth = 2 / zoom;
                        const s = 6 / zoom;
                        ctx.beginPath(); ctx.moveTo(currentPoints[0].x - s, currentPoints[0].y - s); ctx.lineTo(currentPoints[0].x + s, currentPoints[0].y + s);
                        ctx.moveTo(currentPoints[0].x + s, currentPoints[0].y - s); ctx.lineTo(currentPoints[0].x - s, currentPoints[0].y + s); ctx.stroke();
                        ctx.restore();
                        // Linha tracejada do p1 até o mouse
                        ctx.beginPath(); ctx.moveTo(currentPoints[0].x, currentPoints[0].y); ctx.lineTo(computedPt.x, computedPt.y); ctx.stroke();
                    }
                    // Preview do arco com os 3 pontos (p1, mouse como p_mid, p2)
                    if (currentPoints.length === 2) {
                        // Linha tracejada do p2 até o mouse
                        ctx.beginPath(); ctx.moveTo(currentPoints[1].x, currentPoints[1].y); ctx.lineTo(computedPt.x, computedPt.y); ctx.stroke();
                        const previewArc = new Arc(currentPoints[0], computedPt, currentPoints[1]);
                        if (previewArc.valid) {
                            ctx.save(); ctx.setLineDash([4/zoom, 4/zoom]); ctx.strokeStyle = '#ff9900'; ctx.lineWidth = 1.5 / zoom;
                            previewArc.draw(ctx, false);
                            ctx.restore();
                        }
                        // Marca o ponto final com um X
                        ctx.save(); ctx.setLineDash([]);
                        ctx.strokeStyle = '#ff9900'; ctx.lineWidth = 2 / zoom;
                        const s = 6 / zoom;
                        ctx.beginPath(); ctx.moveTo(currentPoints[1].x - s, currentPoints[1].y - s); ctx.lineTo(currentPoints[1].x + s, currentPoints[1].y + s);
                        ctx.moveTo(currentPoints[1].x + s, currentPoints[1].y - s); ctx.lineTo(currentPoints[1].x - s, currentPoints[1].y + s); ctx.stroke();
                        ctx.restore();
                    }
                }
            }
            
            // PREVIEW DE MOVE EM LOTE
            if (currentMode === 'move' && selectionPhase === 'target' && moveBasePoint) {
                ctx.strokeStyle = '#ffaa00'; ctx.lineWidth = 1.5 / zoom;
                let dx = computedPt.x - moveBasePoint.x; let dy = computedPt.y - moveBasePoint.y;
                ctx.save(); ctx.translate(dx, dy); selectedShapes.forEach(s => s.draw(ctx, false)); ctx.restore();
            }

            // PREVIEW DE COPY
            if (currentMode === 'copy' && selectionPhase === 'target' && copyBasePoint) {
                ctx.strokeStyle = '#00ff88'; ctx.lineWidth = 1.5 / zoom;
                ctx.setLineDash([4/zoom, 3/zoom]);
                let dx = computedPt.x - copyBasePoint.x; let dy = computedPt.y - copyBasePoint.y;
                ctx.save(); ctx.translate(dx, dy); selectedShapes.forEach(s => s.draw(ctx, false)); ctx.restore();
                ctx.setLineDash([]);
            }

            // PREVIEW DE ROTATE
            if (currentMode === 'rotate' && selectionPhase === 'target' && rotateBasePoint) {
                ctx.strokeStyle = '#ff8800'; ctx.lineWidth = 1.5 / zoom;
                ctx.setLineDash([4/zoom, 3/zoom]);
                // Linha do eixo de rotação
                ctx.beginPath(); ctx.moveTo(rotateBasePoint.x, rotateBasePoint.y); ctx.lineTo(computedPt.x, computedPt.y); ctx.stroke();
                // Círculo guia
                const dist = rotateBasePoint.distanceTo(computedPt);
                ctx.beginPath(); ctx.arc(rotateBasePoint.x, rotateBasePoint.y, dist, 0, 2*Math.PI); ctx.stroke();
                // Ghost dos shapes rotacionados
                const angle = Math.atan2(computedPt.y - rotateBasePoint.y, computedPt.x - rotateBasePoint.x);
                ctx.save();
                ctx.setLineDash([3/zoom, 3/zoom]);
                ctx.strokeStyle = 'rgba(255, 136, 0, 0.55)'; ctx.lineWidth = 1.5 / zoom;
                selectedShapes.forEach(shape => {
                    const rotated = rotateShape(shape, rotateBasePoint, angle);
                    if (rotated) rotated.draw(ctx, false);
                });
                ctx.restore();
                ctx.setLineDash([]);
            }

            // PREVIEW DE MIRROR
            if (currentMode === 'mirror') {
                if (selectionPhase === 'axis2' && mirrorAxisP1) {
                    const axisEnd = computedPt;
                    // Eixo de espelhamento (linha extendida)
                    ctx.save();
                    ctx.setLineDash([6/zoom, 4/zoom]);
                    ctx.strokeStyle = '#ff44ff'; ctx.lineWidth = 1.5 / zoom;
                    const dx = axisEnd.x - mirrorAxisP1.x, dy = axisEnd.y - mirrorAxisP1.y;
                    const len = Math.hypot(dx, dy) || 1;
                    const ext = 10000;
                    ctx.beginPath();
                    ctx.moveTo(mirrorAxisP1.x - (dx/len)*ext, mirrorAxisP1.y - (dy/len)*ext);
                    ctx.lineTo(axisEnd.x   + (dx/len)*ext, axisEnd.y   + (dy/len)*ext);
                    ctx.stroke();
                    ctx.restore();
                    // Marcador do 1º ponto
                    ctx.save(); ctx.setLineDash([]);
                    ctx.strokeStyle = '#ff44ff'; ctx.lineWidth = 2/zoom;
                    const s = 6/zoom;
                    ctx.beginPath();
                    ctx.moveTo(mirrorAxisP1.x-s, mirrorAxisP1.y-s); ctx.lineTo(mirrorAxisP1.x+s, mirrorAxisP1.y+s);
                    ctx.moveTo(mirrorAxisP1.x+s, mirrorAxisP1.y-s); ctx.lineTo(mirrorAxisP1.x-s, mirrorAxisP1.y+s);
                    ctx.stroke(); ctx.restore();
                    // Ghost dos shapes espelhados
                    ctx.save();
                    ctx.setLineDash([3/zoom, 3/zoom]);
                    ctx.strokeStyle = 'rgba(255, 100, 255, 0.55)'; ctx.lineWidth = 1.5 / zoom;
                    selectedShapes.forEach(shape => {
                        const mirrored = mirrorShape(shape, mirrorAxisP1, axisEnd);
                        if (mirrored) mirrored.draw(ctx, false);
                    });
                    ctx.restore();
                }
                if (selectionPhase === 'axis1') {
                    // Linha guia do eixo seguindo o mouse
                    ctx.save();
                    ctx.setLineDash([6/zoom, 4/zoom]);
                    ctx.strokeStyle = '#ff44ff'; ctx.lineWidth = 1 / zoom;
                    ctx.beginPath(); ctx.moveTo(computedPt.x - 10000, computedPt.y); ctx.lineTo(computedPt.x + 10000, computedPt.y); ctx.stroke();
                    ctx.restore();
                }
            }

            // EXTEND - destaca limites selecionados
            if (currentMode === 'extend' && extendBoundaries.length > 0) {
                ctx.save();
                ctx.strokeStyle = 'rgba(255, 200, 0, 0.6)';
                ctx.lineWidth = 3 / zoom;
                extendBoundaries.forEach(s => s.draw(ctx, false));
                ctx.restore();
            }

            // POLAR
            if (currentPolarAngle !== null && !activeSnap && (currentPoints.length > 0 || (currentMode === 'move' && selectionPhase === 'target' && moveBasePoint) || (currentMode === 'mirror' && selectionPhase === 'axis2' && mirrorAxisP1))) {
                let bp = currentPoints.length > 0 ? currentPoints[currentPoints.length - 1] : (currentMode === 'mirror' ? mirrorAxisP1 : moveBasePoint);
                ctx.strokeStyle = '#00bcff'; ctx.lineWidth = 1 / zoom; ctx.beginPath(); ctx.moveTo(bp.x, bp.y);
                ctx.lineTo(bp.x + Math.cos(currentPolarAngle)*20000, bp.y + Math.sin(currentPolarAngle)*20000); ctx.stroke();
            }

            // CAIXAS DE SELEÇÃO
            if (isSelectingBox && selectionStartPt) {
                let endPt = screenToModel(screenMousePos); let isCrossing = selectionStartPt.x > endPt.x;
                if (isCrossing) { ctx.fillStyle = 'rgba(0, 255, 100, 0.15)'; ctx.strokeStyle = '#00ff64'; ctx.setLineDash([4 / zoom, 4 / zoom]); }
                else { ctx.fillStyle = 'rgba(0, 110, 255, 0.15)'; ctx.strokeStyle = '#0070ff'; }
                ctx.lineWidth = 1 / zoom;
                ctx.fillRect(selectionStartPt.x, selectionStartPt.y, endPt.x - selectionStartPt.x, endPt.y - selectionStartPt.y);
                ctx.strokeRect(selectionStartPt.x, selectionStartPt.y, endPt.x - selectionStartPt.x, endPt.y - selectionStartPt.y);
                ctx.setLineDash([]);
            }

            // OTRACK - guias discretas (estilo AutoCAD)
            if (activeOTrackLines.length > 0) {
                ctx.save();
                ctx.strokeStyle = 'rgba(0, 229, 255, 0.35)';
                ctx.lineWidth = 1 / zoom;
                ctx.setLineDash([5 / zoom, 3 / zoom]);
                activeOTrackLines.forEach(vl => {
                    ctx.beginPath(); ctx.moveTo(vl.p1.x, vl.p1.y); ctx.lineTo(vl.p2.x, vl.p2.y); ctx.stroke();
                });
                ctx.restore();
            }

            ctx.restore();

            // RENDER SNAP
            if (activeSnap) {
                const sX = activeSnap.point.x * zoom + panX; const sY = activeSnap.point.y * zoom + panY;
                ctx.lineWidth = 2; const size = 10;
                ctx.strokeStyle = '#5cff5c';

                if (activeSnap.type === 'endpoint') ctx.strokeRect(sX - size/2, sY - size/2, size, size);
                else if (activeSnap.type === 'vertex') {
                    // Diamante pequeno para vértices internos
                    ctx.beginPath();
                    ctx.moveTo(sX, sY - size/2);
                    ctx.lineTo(sX + size/2, sY);
                    ctx.lineTo(sX, sY + size/2);
                    ctx.lineTo(sX - size/2, sY);
                    ctx.closePath();
                    ctx.stroke();
                }
                else if (activeSnap.type === 'midpoint') { ctx.beginPath(); ctx.moveTo(sX, sY - size/2); ctx.lineTo(sX + size/2, sY + size/2); ctx.lineTo(sX - size/2, sY + size/2); ctx.closePath(); ctx.stroke(); }
                else if (activeSnap.type === 'center') { ctx.beginPath(); ctx.arc(sX, sY, size/2, 0, 2*Math.PI); ctx.stroke(); }
                else if (activeSnap.type === 'quadrant') { ctx.beginPath(); ctx.moveTo(sX, sY - size/2); ctx.lineTo(sX + size/2, sY); ctx.lineTo(sX, sY + size/2); ctx.lineTo(sX - size/2, sY); ctx.closePath(); ctx.stroke(); }
            }
            // Indicador para interseções OTrack (quando computedPt difere do snap)
            else if (computedPt && OTRACK.tracked.length >= 2) {
                // Verifica se é uma interseção de guias
                for (let i = 0; i < OTRACK.tracked.length; i++) {
                    for (let j = 0; j < OTRACK.tracked.length; j++) {
                        if (i === j) continue;
                        const inter = new Point(OTRACK.tracked[j].point.x, OTRACK.tracked[i].point.y);
                        if (computedPt.distanceTo(inter) < 0.01) {
                            const sX = inter.x * zoom + panX; const sY = inter.y * zoom + panY;
                            ctx.strokeStyle = '#ffff00'; ctx.lineWidth = 2;
                            const size = 8;
                            ctx.beginPath();
                            ctx.moveTo(sX - size/2, sY - size/2); ctx.lineTo(sX + size/2, sY + size/2);
                            ctx.moveTo(sX + size/2, sY - size/2); ctx.lineTo(sX - size/2, sY + size/2);
                            ctx.stroke();
                            break;
                        }
                    }
                }
            }
        }
    </script>
