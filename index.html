<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TraceLine CAD 2D</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #1e1e1e; color: #fff;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        #toolbar {
            background-color: #2d2d2d; padding: 10px;
            display: flex; gap: 8px; align-items: center;
            border-bottom: 2px solid #3d3d3d;
            user-select: none; flex-wrap: wrap;
        }
        .group {
            display: flex; gap: 4px; border-right: 1px solid #555; padding-right: 8px; margin-right: 4px;
        }
        .group:last-child { border-right: none; }
        .label { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 2px; display: block; font-weight: bold;}
        button {
            background-color: #444; color: white; border: 1px solid #555;
            padding: 6px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 13px;
        }
        button.active { background-color: #007acc; border-color: #0098ff; }
        button:hover { background-color: #555; }
        #input-panel { margin-left: auto; display: flex; gap: 5px; align-items: center; }
        input[type="text"] {
            background-color: #333; border: 1px solid #555;
            color: white; padding: 6px; border-radius: 4px; width: 150px;
        }
        #canvas-container { flex: 1; position: relative; cursor: crosshair; }
        canvas { display: block; width: 100%; height: 100%; }
        #statusbar {
            background-color: #2d2d2d; padding: 5px 15px;
            font-size: 12px; color: #aaa; border-top: 1px solid #3d3d3d;
            display: flex; gap: 20px; user-select: none;
        }
    </style>
</head>
<body>

    <div id="toolbar">
        <div class="group">
            <div>
                <span class="label">Desenhar</span>
                <button id="btn-line" class="active" onclick="setMode('line')">Linha</button>
                <button id="btn-polyline" onclick="setMode('polyline')">Polyline</button>
                <button id="btn-circle" onclick="setMode('circle')">Círculo</button>
                <button id="btn-arc" onclick="setMode('arc')">Arco</button>
            </div>
        </div>
        
        <div class="group">
            <div>
                <span class="label">Modificar</span>
                <button id="btn-move" onclick="setMode('move')">Move</button>
                <button id="btn-copy" onclick="setMode('copy')">Copy</button>
                <button id="btn-rotate" onclick="setMode('rotate')">Rotate</button>
                <button id="btn-offset" onclick="setMode('offset')">Offset</button>
                <button id="btn-trim" onclick="setMode('trim')">Trim</button>
                <button id="btn-extend" onclick="setMode('extend')">Extend</button>
                <button id="btn-mirror" onclick="setMode('mirror')">Mirror</button>
                <button id="btn-delete" onclick="setMode('delete')" style="background-color: #a23333;">Delete</button>
            </div>
        </div>

        <button onclick="clearSelection()" style="background-color: #555;">Limpar Seleção</button>
        <button onclick="clearCanvas()" style="background-color: #222;">Limpar Tudo</button>
        <button onclick="saveDrawing()" style="background-color: #1a5a1a;">💾 Salvar</button>
        <button onclick="loadDrawing()" style="background-color: #1a3a5a;">📂 Carregar</button>

        <div id="input-panel">
            <span style="font-size: 12px; color: #aaa;" id="prompt-label">Distância:</span>
            <input type="text" id="coord-input" placeholder="Digite e aperte Enter..." autocomplete="off">
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="cadCanvas"></canvas>
    </div>

    <div id="statusbar">
        <div>Cursor: <span id="coord-display">X: 0, Y: 0</span></div>
        <div>Modo Atual: <span id="mode-display" style="color:#0098ff; font-weight:bold;">LINHA</span></div>
        <div>Selecionados: <span id="select-count" style="color:#ffaa00; font-weight:bold;">0</span></div>
        <div id="instruction-display" style="color: #ffaa00;">Clique para iniciar o desenho.</div>
    </div>

    <script>
        // --- 1. CLASSES GEOMÉTRICAS ---
        class Point {
            constructor(x, y) { this.x = x; this.y = y; }
            distanceTo(other) { return Math.hypot(this.x - other.x, this.y - other.y); }
        }

        class Line {
            constructor(p1, p2) { this.p1 = p1; this.p2 = p2; this.id = Math.random(); }
            getSnapPoints() {
                return [
                    { point: this.p1, type: 'endpoint' },
                    { point: this.p2, type: 'endpoint' },
                    { point: new Point((this.p1.x + this.p2.x)/2, (this.p1.y + this.p2.y)/2), type: 'midpoint' }
                ];
            }
            draw(ctx, selected = false) {
                ctx.beginPath(); ctx.moveTo(this.p1.x, this.p1.y); ctx.lineTo(this.p2.x, this.p2.y); 
                if(selected) { ctx.strokeStyle = '#00bfff'; ctx.lineWidth = 3 / zoom; }
                ctx.stroke();
            }
            distanceToPoint(pt) {
                const A = pt.x - this.p1.x; const B = pt.y - this.p1.y;
                const C = this.p2.x - this.p1.x; const D = this.p2.y - this.p1.y;
                const dot = A * C + B * D; const len_sq = C * C + D * D;
                let param = -1; if (len_sq !== 0) param = dot / len_sq;
                let xx, yy;
                if (param < 0) { xx = this.p1.x; yy = this.p1.y; }
                else if (param > 1) { xx = this.p2.x; yy = this.p2.y; }
                else { xx = this.p1.x + param * C; yy = this.p1.y + param * D; }
                return Math.hypot(pt.x - xx, pt.y - yy);
            }
            isFullyInside(xMin, xMax, yMin, yMax) {
                return (this.p1.x >= xMin && this.p1.x <= xMax && this.p1.y >= yMin && this.p1.y <= yMax) &&
                       (this.p2.x >= xMin && this.p2.x <= xMax && this.p2.y >= yMin && this.p2.y <= yMax);
            }
            intersectsBox(xMin, xMax, yMin, yMax) {
                if (this.isFullyInside(xMin, xMax, yMin, yMax)) return true;
                if (findLineIntersection(this.p1, this.p2, new Point(xMin, yMin), new Point(xMax, yMin), true)) return true;
                if (findLineIntersection(this.p1, this.p2, new Point(xMax, yMin), new Point(xMax, yMax), true)) return true;
                if (findLineIntersection(this.p1, this.p2, new Point(xMax, yMax), new Point(xMin, yMax), true)) return true;
                if (findLineIntersection(this.p1, this.p2, new Point(xMin, yMax), new Point(xMin, yMin), true)) return true;
                return false;
            }
        }

        class Polyline {
            constructor(points) {
                this.points = [...points];
                this.id = Math.random().toString(36).substr(2, 9);
            }
            getSnapPoints() {
                const snaps = [];
                const n = this.points.length;
                if (n < 2) return snaps;
                // Extremidades = endpoints
                snaps.push({ point: this.points[0], type: 'endpoint' });
                snaps.push({ point: this.points[n - 1], type: 'endpoint' });
                // Vértices internos = vertex
                for (let i = 1; i < n - 1; i++) {
                    snaps.push({ point: this.points[i], type: 'vertex' });
                }
                // Midpoints dos segmentos
                for (let i = 0; i < n - 1; i++) {
                    const mid = new Point(
                        (this.points[i].x + this.points[i + 1].x) / 2,
                        (this.points[i].y + this.points[i + 1].y) / 2
                    );
                    snaps.push({ point: mid, type: 'midpoint' });
                }
                return snaps;
            }
            draw(ctx, selected = false) {
                if (this.points.length < 2) return;
                ctx.beginPath();
                ctx.moveTo(this.points[0].x, this.points[0].y);
                for (let i = 1; i < this.points.length; i++) {
                    ctx.lineTo(this.points[i].x, this.points[i].y);
                }
                ctx.strokeStyle = selected ? '#00bfff' : '#ffffff';
                ctx.lineWidth = selected ? 3 / zoom : 2 / zoom;
                ctx.stroke();
            }
            distanceToPoint(pt) {
                let minDist = Infinity;
                for (let i = 0; i < this.points.length - 1; i++) {
                    const seg = new Line(this.points[i], this.points[i + 1]);
                    minDist = Math.min(minDist, seg.distanceToPoint(pt));
                }
                return minDist;
            }
            isFullyInside(xMin, xMax, yMin, yMax) {
                return this.points.every(p =>
                    p.x >= xMin && p.x <= xMax && p.y >= yMin && p.y <= yMax
                );
            }
            intersectsBox(xMin, xMax, yMin, yMax) {
                if (this.isFullyInside(xMin, xMax, yMin, yMax)) return true;
                for (let i = 0; i < this.points.length - 1; i++) {
                    const seg = new Line(this.points[i], this.points[i + 1]);
                    if (seg.intersectsBox(xMin, xMax, yMin, yMax)) return true;
                }
                return false;
            }
        }

        class Circle {
            constructor(center, radius) { this.center = center; this.radius = radius; this.id = Math.random(); }
            getSnapPoints() {
                const c = this.center; const r = this.radius;
                return [
                    { point: c, type: 'center' },
                    { point: new Point(c.x, c.y - r), type: 'quadrant' },
                    { point: new Point(c.x + r, c.y), type: 'quadrant' },
                    { point: new Point(c.x, c.y + r), type: 'quadrant' },
                    { point: new Point(c.x - r, c.y), type: 'quadrant' }
                ];
            }
            draw(ctx, selected = false) {
                ctx.beginPath(); ctx.arc(this.center.x, this.center.y, this.radius, 0, 2 * Math.PI); 
                if(selected) { ctx.strokeStyle = '#00bfff'; ctx.lineWidth = 3 / zoom; }
                ctx.stroke();
            }
            distanceToPoint(pt) { return Math.abs(this.center.distanceTo(pt) - this.radius); }
            isFullyInside(xMin, xMax, yMin, yMax) {
                return (this.center.x - this.radius >= xMin && this.center.x + this.radius <= xMax &&
                        this.center.y - this.radius >= yMin && this.center.y + this.radius <= yMax);
            }
            intersectsBox(xMin, xMax, yMin, yMax) {
                if (this.isFullyInside(xMin, xMax, yMin, yMax)) return true;
                let closestX = Math.max(xMin, Math.min(this.center.x, xMax));
                let closestY = Math.max(yMin, Math.min(this.center.y, yMax));
                return this.center.distanceTo(new Point(closestX, closestY)) <= this.radius;
            }
        }

        // Helper: calcula centro do círculo circunscrito por 3 pontos
        function circumcircle(p1, p2, p3) {
            const ax = p1.x, ay = p1.y;
            const bx = p2.x, by = p2.y;
            const cx = p3.x, cy = p3.y;
            const D = 2 * (ax * (by - cy) + bx * (cy - ay) + cx * (ay - by));
            if (Math.abs(D) < 1e-10) return null; // pontos colineares
            const ux = ((ax*ax + ay*ay) * (by - cy) + (bx*bx + by*by) * (cy - ay) + (cx*cx + cy*cy) * (ay - by)) / D;
            const uy = ((ax*ax + ay*ay) * (cx - bx) + (bx*bx + by*by) * (ax - cx) + (cx*cx + cy*cy) * (bx - ax)) / D;
            const center = new Point(ux, uy);
            const radius = center.distanceTo(p1);
            return { center, radius };
        }

        // Normaliza ângulo para [0, 2π)
        function normalizeAngle(a) { return ((a % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI); }

        // Verifica se um ângulo está dentro do arco (sentido anti-horário de start até end)
        function angleInArc(angle, startA, endA) {
            angle = normalizeAngle(angle);
            startA = normalizeAngle(startA);
            endA = normalizeAngle(endA);
            if (startA <= endA) return angle >= startA && angle <= endA;
            return angle >= startA || angle <= endA;
        }

        class Arc {
            // p1 = ponto inicial, p3 = ponto intermediário, p2 = ponto final
            constructor(p1, p3, p2) {
                this.p1 = p1; this.p3 = p3; this.p2 = p2;
                this.id = Math.random();
                this._compute();
            }
            _compute() {
                const cc = circumcircle(this.p1, this.p3, this.p2);
                if (!cc) { this.valid = false; return; }
                this.valid = true;
                this.center = cc.center;
                this.radius = cc.radius;
                this.startAngle = normalizeAngle(Math.atan2(this.p1.y - this.center.y, this.p1.x - this.center.x));
                this.endAngle   = normalizeAngle(Math.atan2(this.p2.y - this.center.y, this.p2.x - this.center.x));
                // Determina direção: o ponto intermediário p3 deve estar dentro do arco (anti-horário)
                const midTestAngle = normalizeAngle(Math.atan2(this.p3.y - this.center.y, this.p3.x - this.center.x));
                // Testa ambas as direções e escolhe aquela que inclui p3
                const ccwIncludes = angleInArc(midTestAngle, this.startAngle, this.endAngle);
                this.counterClockwise = ccwIncludes;
            }
            getSnapPoints() {
                if (!this.valid) return [];
                // Ponto médio do arco
                let midAngle;
                const sa = this.startAngle, ea = this.endAngle;
                if (this.counterClockwise) {
                    midAngle = sa <= ea ? (sa + ea) / 2 : normalizeAngle(sa + (normalizeAngle(ea - sa + 2*Math.PI)) / 2);
                } else {
                    midAngle = ea <= sa ? (sa + ea) / 2 : normalizeAngle(ea + (normalizeAngle(sa - ea + 2*Math.PI)) / 2);
                }
                const midPt = new Point(this.center.x + this.radius * Math.cos(midAngle), this.center.y + this.radius * Math.sin(midAngle));
                return [
                    { point: this.p1, type: 'endpoint' },
                    { point: this.p2, type: 'endpoint' },
                    { point: midPt, type: 'midpoint' },
                    { point: this.center, type: 'center' }
                ];
            }
            draw(ctx, selected = false) {
                if (!this.valid) return;
                if (selected) { ctx.strokeStyle = '#00bfff'; ctx.lineWidth = 3 / zoom; }
                ctx.beginPath();
                if (this.counterClockwise) {
                    ctx.arc(this.center.x, this.center.y, this.radius, this.startAngle, this.endAngle, false);
                } else {
                    ctx.arc(this.center.x, this.center.y, this.radius, this.startAngle, this.endAngle, true);
                }
                ctx.stroke();
            }
            distanceToPoint(pt) {
                if (!this.valid) return Infinity;
                const angle = normalizeAngle(Math.atan2(pt.y - this.center.y, pt.x - this.center.x));
                const onArc = this.counterClockwise ? angleInArc(angle, this.startAngle, this.endAngle)
                                                    : angleInArc(angle, this.endAngle, this.startAngle);
                if (onArc) return Math.abs(this.center.distanceTo(pt) - this.radius);
                // Fora do arco: distância aos endpoints
                return Math.min(pt.distanceTo(this.p1), pt.distanceTo(this.p2));
            }
            isFullyInside(xMin, xMax, yMin, yMax) {
                if (!this.valid) return false;
                return this.p1.x >= xMin && this.p1.x <= xMax && this.p1.y >= yMin && this.p1.y <= yMax &&
                       this.p2.x >= xMin && this.p2.x <= xMax && this.p2.y >= yMin && this.p2.y <= yMax &&
                       this.p3.x >= xMin && this.p3.x <= xMax && this.p3.y >= yMin && this.p3.y <= yMax;
            }
            intersectsBox(xMin, xMax, yMin, yMax) {
                if (this.isFullyInside(xMin, xMax, yMin, yMax)) return true;
                if (this.distanceToPoint(new Point(Math.max(xMin, Math.min(this.center.x, xMax)),
                                                    Math.max(yMin, Math.min(this.center.y, yMax)))) <= this.radius + 0.01) return true;
                return false;
            }
        }

        // --- 2. ESTADO GLOBAL ---
        const canvas = document.getElementById('cadCanvas');
        const ctx = canvas.getContext('2d');
        const coordInput = document.getElementById('coord-input');
        
        let shapes = [];
        let currentMode = 'line';
        let currentPoints = [];   
        
        let screenMousePos = new Point(0, 0); 
        let computedPt = new Point(0, 0);  
        let currentPolarAngle = null;

        let zoom = 1.0;
        let panX = 0; let panY = 0;
        let isPanning = false; let startPan = { x: 0, y: 0 };

        let activeSnap = null;
        let trackedPoints = [];
        let activeOTrackLines = [];

        // Modificações e Seleção
        let selectedShapes = []; 
        let moveBasePoint = null;
        let offsetDistance = 50;
        let selectionPhase = "select"; // "select" | "basepoint" | "target" | "axis1" | "axis2"
        let mirrorAxisP1 = null;
        let copyBasePoint = null;
        let copyMode = "single"; // "single" | "multiple"
        let rotateBasePoint = null;
        let rotateAngle = null;
        let extendPhase = "boundary"; // "boundary" | "select"
        let extendBoundaries = []; // objetos que são limites

        let selectionStartPt = null; 
        let isSelectingBox = false;

        const SNAP_TOLERANCE_SCREEN = 15; 
        const POLAR_ANGLES = [0, 45, 90, 135, 180, 225, 270, 315];
        const POLAR_TOLERANCE = 4 * (Math.PI / 180);

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight;
            drawEverything();
        }
        window.addEventListener('resize', resizeCanvas);
        setTimeout(resizeCanvas, 100);

        function screenToModel(sPt) { return new Point((sPt.x - panX) / zoom, (sPt.y - panY) / zoom); }

        // --- 3. SISTEMA DE SNAP E OTRACK REESCRITO ---
        
        // Calcula interseção entre duas linhas (infinitas ou segmentos)
        function findLineIntersection(p1, p2, p3, p4, limitToSegments = false) {
            const denom = (p4.y - p3.y) * (p2.x - p1.x) - (p4.x - p3.x) * (p2.y - p1.y);
            if (Math.abs(denom) < 0.0001) return null;
            const ua = ((p4.x - p3.x) * (p1.y - p3.y) - (p4.y - p3.y) * (p1.x - p3.x)) / denom;
            const ub = ((p2.x - p1.x) * (p1.y - p3.y) - (p2.y - p1.y) * (p1.x - p3.x)) / denom;
            if (limitToSegments && (ua < 0 || ua > 1 || ub < 0 || ub > 1)) return null;
            return new Point(p1.x + ua * (p2.x - p1.x), p1.y + ua * (p2.y - p1.y));
        }

        // Retorna todos os segmentos físicos do desenho
        function getAllPhysicalSegments() {
            let segments = [];
            shapes.forEach(shape => {
                if (shape instanceof Line) segments.push(shape);
                else if (shape instanceof Polyline) {
                    for (let i = 0; i < shape.points.length - 1; i++) {
                        segments.push(new Line(shape.points[i], shape.points[i+1]));
                    }
                }
            });
            return segments;
        }

        // Retorna todos os pontos de snap de todos os shapes
        function getAllSnapPoints() {
            const snaps = [];
            shapes.forEach(shape => {
                snaps.push(...shape.getSnapPoints());
            });
            return snaps;
        }

        // Distância de um ponto a uma linha infinita (não segmento)
        function pointToInfiniteLineDist(pt, lineP1, lineP2) {
            const A = pt.x - lineP1.x;
            const B = pt.y - lineP1.y;
            const C = lineP2.x - lineP1.x;
            const D = lineP2.y - lineP1.y;
            const dot = A * C + B * D;
            const lenSq = C * C + D * D;
            if (lenSq === 0) return pt.distanceTo(lineP1);
            const proj = dot / lenSq;
            const closestX = lineP1.x + proj * C;
            const closestY = lineP1.y + proj * D;
            return Math.hypot(pt.x - closestX, pt.y - closestY);
        }

        // Sistema OTrack - integrado com OSnap
        const OTRACK = {
            tracked: [],           // { point: Point }
            maxTracked: 3,
            computedPoint: null,
            
            // Adiciona ponto rastreado (evita duplicatas próximas)
            addPoint(pt) {
                const isDuplicate = this.tracked.some(t => t.point.distanceTo(pt) < 0.01);
                if (!isDuplicate) {
                    if (this.tracked.length >= this.maxTracked) {
                        this.tracked.shift();
                    }
                    this.tracked.push({ point: new Point(pt.x, pt.y) });
                }
            },
            
            clear() {
                this.tracked = [];
                this.computedPoint = null;
            },
            
            computePoint(modelMouse, basePt = null) {
                const tolerance = SNAP_TOLERANCE_SCREEN / zoom;
                
                // Sempre constrói guias OTrack dos pontos rastreados
                this._buildGuides();
                
                // 1. SNAP DIRETO (OSnap) - captura e rastreia
                const allSnaps = getAllSnapPoints();
                for (const snap of allSnaps) {
                    if (modelMouse.distanceTo(snap.point) < tolerance) {
                        this.addPoint(snap.point); // adiciona ao tracking
                        this.computedPoint = snap.point;
                        activeSnap = { point: snap.point, type: snap.type };
                        currentPolarAngle = null;
                        // Mantém as guias OTrack ativas!
                        return;
                    }
                }
                
                // 2. INTERSEÇÕES entre guias OTrack (H de um × V de outro)
                if (this.tracked.length >= 2) {
                    const interPt = this._findGuideIntersections(modelMouse, tolerance);
                    if (interPt) {
                        this.computedPoint = interPt;
                        activeSnap = null;
                        currentPolarAngle = null;
                        return;
                    }
                }
                
                // 3. PROJEÇÃO nas guias OTrack (H ou V mais próxima)
                if (this.tracked.length > 0) {
                    const projPt = this._findGuideProjection(modelMouse, tolerance);
                    if (projPt) {
                        this.computedPoint = projPt;
                        activeSnap = null;
                        currentPolarAngle = null;
                        return;
                    }
                }
                
                // 4. POLAR - ângulos notáveis
                if (basePt) {
                    const polarAngle = this._findPolarAngle(modelMouse, basePt);
                    if (polarAngle !== null) {
                        const dist = basePt.distanceTo(modelMouse);
                        this.computedPoint = new Point(
                            basePt.x + dist * Math.cos(polarAngle),
                            basePt.y + dist * Math.sin(polarAngle)
                        );
                        currentPolarAngle = polarAngle;
                        activeSnap = null;
                        return;
                    }
                }
                
                // 5. SEM SNAP
                this.computedPoint = modelMouse;
                currentPolarAngle = null;
                activeSnap = null;
            },
            
            // Constrói guias H/V de todos os pontos rastreados
            _buildGuides() {
                activeOTrackLines = [];
                this.tracked.forEach((tp) => {
                    activeOTrackLines.push({ p1: new Point(-50000, tp.point.y), p2: new Point(50000, tp.point.y) });
                    activeOTrackLines.push({ p1: new Point(tp.point.x, -50000), p2: new Point(tp.point.x, 50000) });
                });
            },
            
            // Encontra interseções entre guias H/V de pontos diferentes
            _findGuideIntersections(modelMouse, tolerance) {
                let bestPt = null;
                let bestDist = tolerance;
                
                for (let i = 0; i < this.tracked.length; i++) {
                    for (let j = 0; j < this.tracked.length; j++) {
                        if (i === j) continue;
                        // H do ponto i × V do ponto j
                        const inter = new Point(this.tracked[j].point.x, this.tracked[i].point.y);
                        const dist = modelMouse.distanceTo(inter);
                        if (dist < bestDist) {
                            bestDist = dist;
                            bestPt = inter;
                        }
                    }
                }
                return bestPt;
            },
            
            // Projeção na guia H ou V mais próxima
            _findGuideProjection(modelMouse, tolerance) {
                let bestPt = null;
                let bestDist = tolerance;
                
                for (const tp of this.tracked) {
                    // Projeção na horizontal
                    const distH = Math.abs(modelMouse.y - tp.point.y);
                    if (distH < bestDist) {
                        bestDist = distH;
                        bestPt = new Point(modelMouse.x, tp.point.y);
                    }
                    // Projeção na vertical
                    const distV = Math.abs(modelMouse.x - tp.point.x);
                    if (distV < bestDist) {
                        bestDist = distV;
                        bestPt = new Point(tp.point.x, modelMouse.y);
                    }
                }
                return bestPt;
            },
            
            _findPolarAngle(modelMouse, basePt) {
                let angle = Math.atan2(modelMouse.y - basePt.y, modelMouse.x - basePt.x);
                if (angle < 0) angle += 2 * Math.PI;
                for (const targetDeg of POLAR_ANGLES) {
                    const targetRad = targetDeg * (Math.PI / 180);
                    let diff = Math.abs(angle - targetRad);
                    if (diff > Math.PI) diff = 2 * Math.PI - diff;
                    if (diff < POLAR_TOLERANCE) return targetRad;
                }
                return null;
            }
        };

        // Função de compatibilidade - chama o sistema novo
        function processCalculatedPoint() {
            const modelMouse = screenToModel(screenMousePos);
            
            // Desativa snap em modos de seleção/edição
            if (isSelectingBox ||
                (currentMode === 'move' && selectionPhase === 'select') ||
                (currentMode === 'copy' && selectionPhase === 'select') ||
                (currentMode === 'rotate' && selectionPhase === 'select') ||
                (currentMode === 'mirror' && selectionPhase === 'select') ||
                (currentMode === 'extend' && extendPhase === 'boundary') ||
                ['trim', 'offset', 'delete'].includes(currentMode)) {
                computedPt = modelMouse;
                OTRACK.computedPoint = modelMouse;
                activeSnap = null;
                currentPolarAngle = null;
                activeOTrackLines = [];
                return;
            }
            
            // Determina ponto base para polar
            let basePt = null;
            if (currentPoints.length > 0) {
                basePt = currentPoints[currentPoints.length - 1];
            } else if (currentMode === 'move' && moveBasePoint && selectionPhase === 'target') {
                basePt = moveBasePoint;
            } else if (currentMode === 'copy' && copyBasePoint && selectionPhase === 'target') {
                basePt = copyBasePoint;
            } else if (currentMode === 'rotate' && rotateBasePoint && selectionPhase === 'target') {
                basePt = rotateBasePoint;
            } else if (currentMode === 'mirror' && mirrorAxisP1 && selectionPhase === 'axis2') {
                basePt = mirrorAxisP1;
            }
            
            // Calcula usando o sistema novo
            OTRACK.computePoint(modelMouse, basePt);
            computedPt = OTRACK.computedPoint;
            trackedPoints = OTRACK.tracked.map(t => t.point);
        }

        // --- 4. SELEÇÃO ---
        function getShapeUnderMouse(pt) {
            let threshold = 12 / zoom; let closestShape = null; let minDist = threshold;
            shapes.forEach(shape => {
                let d = shape.distanceToPoint(pt);
                if (d < minDist) { minDist = d; closestShape = shape; }
            });
            return closestShape;
        }

        function executeBoxSelection(start, end) {
            let xMin = Math.min(start.x, end.x); let xMax = Math.max(start.x, end.x);
            let yMin = Math.min(start.y, end.y); let yMax = Math.max(start.y, end.y);
            let isCrossing = start.x > end.x;

            shapes.forEach(shape => {
                if (selectedShapes.some(s => s.id === shape.id)) return;
                if (isCrossing ? shape.intersectsBox(xMin, xMax, yMin, yMax) : shape.isFullyInside(xMin, xMax, yMin, yMax)) {
                    selectedShapes.push(shape);
                }
            });
            document.getElementById('select-count').innerText = selectedShapes.length;
        }

        function clearSelection() { selectedShapes = []; selectionPhase = "select"; document.getElementById('select-count').innerText = 0; drawEverything(); }

        // --- 5. COMANDOS ---

        // Interseção linha-segmento × círculo completo → pontos no segmento
        function lineCircleIntersections(p1, p2, center, radius) {
            const dx = p2.x - p1.x, dy = p2.y - p1.y;
            const fx = p1.x - center.x, fy = p1.y - center.y;
            const a = dx*dx + dy*dy;
            if (a < 1e-12) return [];
            const b = 2*(fx*dx + fy*dy);
            const c = fx*fx + fy*fy - radius*radius;
            const disc = b*b - 4*a*c;
            if (disc < 0) return [];
            const sqrtD = Math.sqrt(disc);
            const results = [];
            const t1 = (-b - sqrtD) / (2*a);
            const t2 = (-b + sqrtD) / (2*a);
            if (t1 >= -1e-9 && t1 <= 1+1e-9) results.push(new Point(p1.x + t1*dx, p1.y + t1*dy));
            if (disc > 1e-10 && t2 >= -1e-9 && t2 <= 1+1e-9) results.push(new Point(p1.x + t2*dx, p1.y + t2*dy));
            return results;
        }

        // Interseção círculo × círculo → pontos brutos (filtrar depois para arcos)
        function circleCircleIntersections(c1, r1, c2, r2) {
            const d = c1.distanceTo(c2);
            if (d > r1 + r2 + 1e-9 || d < Math.abs(r1 - r2) - 1e-9 || d < 1e-9) return [];
            const a = (r1*r1 - r2*r2 + d*d) / (2*d);
            const h2 = r1*r1 - a*a;
            if (h2 < 0) return [];
            const h = Math.sqrt(h2);
            const mx = c1.x + a*(c2.x - c1.x)/d;
            const my = c1.y + a*(c2.y - c1.y)/d;
            if (h < 1e-9) return [new Point(mx, my)];
            const px = h*(c2.y - c1.y)/d;
            const py = h*(c2.x - c1.x)/d;
            return [new Point(mx + px, my - py), new Point(mx - px, my + py)];
        }

        // Filtra pontos que caem sobre um arco (respeitando direção)
        function filterPointsOnArc(pts, arc) {
            return pts.filter(p => {
                const a = normalizeAngle(Math.atan2(p.y - arc.center.y, p.x - arc.center.x));
                return arc.counterClockwise ? angleInArc(a, arc.startAngle, arc.endAngle)
                                            : angleInArc(a, arc.endAngle, arc.startAngle);
            });
        }

        // Verifica se dois ângulos são próximos (tolerância angular)
        function anglesClose(a, b, eps = 0.005) {
            const d = normalizeAngle(a - b);
            return d < eps || d > 2*Math.PI - eps;
        }

        // Cria um Arc a partir de centro/raio/ângulos — usado pelo trim
        function makeArcFromAngles(center, radius, startAngle, endAngle, counterClockwise) {
            let midAngle;
            if (counterClockwise) {
                const span = normalizeAngle(endAngle - startAngle);
                midAngle = normalizeAngle(startAngle + span / 2);
            } else {
                const span = normalizeAngle(startAngle - endAngle);
                midAngle = normalizeAngle(endAngle + span / 2);
            }
            const p1 = new Point(center.x + radius * Math.cos(startAngle), center.y + radius * Math.sin(startAngle));
            const p2 = new Point(center.x + radius * Math.cos(endAngle),   center.y + radius * Math.sin(endAngle));
            const p3 = new Point(center.x + radius * Math.cos(midAngle),    center.y + radius * Math.sin(midAngle));
            return new Arc(p1, p3, p2);
        }

        // Coleta ângulos de interseção de um arco/círculo com todos os outros shapes
        function collectCircleIntersectionAngles(targetId, center, radius, isArc, startA, endA, ccw) {
            let angles = [];
            shapes.forEach(other => {
                if (other.id === targetId) return;
                let pts = [];
                if (other instanceof Line) {
                    pts = lineCircleIntersections(other.p1, other.p2, center, radius);
                } else if (other instanceof Circle) {
                    pts = circleCircleIntersections(center, radius, other.center, other.radius);
                } else if (other instanceof Arc && other.valid) {
                    pts = circleCircleIntersections(center, radius, other.center, other.radius);
                    pts = filterPointsOnArc(pts, other);
                }
                // Se for arco (não círculo completo), filtrar ao trecho do arco
                if (isArc) {
                    pts = pts.filter(p => {
                        const a = normalizeAngle(Math.atan2(p.y - center.y, p.x - center.x));
                        const onArc = ccw ? angleInArc(a, startA, endA) : angleInArc(a, endA, startA);
                        return onArc && !anglesClose(a, startA) && !anglesClose(a, endA);
                    });
                }
                pts.forEach(p => {
                    const a = normalizeAngle(Math.atan2(p.y - center.y, p.x - center.x));
                    if (!angles.some(ia => anglesClose(ia, a))) angles.push(a);
                });
            });
            return angles;
        }

        // TRIM em Linha/Polyline (lógica original + intersecções com arcos/círculos)
        function runTrimLine(segmentToTrim, clickPt) {
            let splitPoints = [];
            // Linha × linhas
            getAllPhysicalSegments().forEach(s => {
                const same = (s.p1 === segmentToTrim.p1 && s.p2 === segmentToTrim.p2);
                if (same) return;
                let inter = findLineIntersection(segmentToTrim.p1, segmentToTrim.p2, s.p1, s.p2, true);
                if (inter && inter.distanceTo(segmentToTrim.p1) > 0.01 && inter.distanceTo(segmentToTrim.p2) > 0.01) {
                    if (!splitPoints.some(sp => sp.distanceTo(inter) < 0.01)) splitPoints.push(inter);
                }
            });
            // Linha × arcos e círculos
            shapes.forEach(shape => {
                let pts = [];
                if (shape instanceof Circle) {
                    pts = lineCircleIntersections(segmentToTrim.p1, segmentToTrim.p2, shape.center, shape.radius);
                } else if (shape instanceof Arc && shape.valid) {
                    pts = lineCircleIntersections(segmentToTrim.p1, segmentToTrim.p2, shape.center, shape.radius);
                    pts = filterPointsOnArc(pts, shape);
                }
                pts.forEach(pt => {
                    if (pt.distanceTo(segmentToTrim.p1) > 0.01 && pt.distanceTo(segmentToTrim.p2) > 0.01) {
                        if (!splitPoints.some(sp => sp.distanceTo(pt) < 0.01)) splitPoints.push(pt);
                    }
                });
            });

            const p1 = segmentToTrim.p1;
            splitPoints.sort((a, b) => p1.distanceTo(a) - p1.distanceTo(b));
            let subSegments = []; let currentStart = p1;
            splitPoints.forEach(pt => { subSegments.push(new Line(currentStart, pt)); currentStart = pt; });
            subSegments.push(new Line(currentStart, segmentToTrim.p2));

            let indexToRemove = -1;
            subSegments.forEach((sub, idx) => { if (sub.distanceToPoint(clickPt) < (12 / zoom)) indexToRemove = idx; });
            if (indexToRemove !== -1) {
                subSegments.splice(indexToRemove, 1);
                shapes = shapes.filter(s => s.id !== segmentToTrim.id);
                subSegments.forEach(sub => shapes.push(sub));
            }
        }

        // TRIM em Arco → divide o arco, remove o trecho clicado
        function runTrimArcShape(arc, clickPt) {
            if (!arc.valid) return;
            const ccw = arc.counterClockwise;
            const startA = arc.startAngle, endA = arc.endAngle;

            let interAngles = collectCircleIntersectionAngles(arc.id, arc.center, arc.radius, true, startA, endA, ccw);
            if (interAngles.length === 0) return;

            // Ordena pela distância angular a partir de startA na direção do arco
            interAngles.sort((a, b) => {
                const da = ccw ? normalizeAngle(a - startA) : normalizeAngle(startA - a);
                const db = ccw ? normalizeAngle(b - startA) : normalizeAngle(startA - b);
                return da - db;
            });

            const bounds = [startA, ...interAngles, endA];
            const clickAngle = normalizeAngle(Math.atan2(clickPt.y - arc.center.y, clickPt.x - arc.center.x));

            let indexToRemove = -1;
            for (let i = 0; i < bounds.length - 1; i++) {
                const sa = bounds[i], ea = bounds[i+1];
                const inSub = ccw ? angleInArc(clickAngle, sa, ea) : angleInArc(clickAngle, ea, sa);
                if (inSub) { indexToRemove = i; break; }
            }
            if (indexToRemove === -1) return;

            shapes = shapes.filter(s => s.id !== arc.id);
            for (let i = 0; i < bounds.length - 1; i++) {
                if (i !== indexToRemove)
                    shapes.push(makeArcFromAngles(arc.center, arc.radius, bounds[i], bounds[i+1], ccw));
            }
        }

        // TRIM em Círculo → converte em arcos, remove o trecho clicado
        function runTrimCircle(circle, clickPt) {
            let angles = collectCircleIntersectionAngles(circle.id, circle.center, circle.radius, false);
            if (angles.length === 0) return;

            angles.sort((a, b) => a - b); // ordena 0 → 2π
            const n = angles.length;
            const clickAngle = normalizeAngle(Math.atan2(clickPt.y - circle.center.y, clickPt.x - circle.center.x));

            let indexToRemove = -1;
            for (let i = 0; i < n; i++) {
                const sa = angles[i];
                const ea = angles[(i + 1) % n];
                if (angleInArc(clickAngle, sa, ea)) { indexToRemove = i; break; }
            }
            if (indexToRemove === -1) return;

            shapes = shapes.filter(s => s.id !== circle.id);
            for (let i = 0; i < n; i++) {
                if (i !== indexToRemove) {
                    const sa = angles[i];
                    const ea = angles[(i + 1) % n];
                    shapes.push(makeArcFromAngles(circle.center, circle.radius, sa, ea, true));
                }
            }
        }

        // TRIM principal — detecta o tipo do shape clicado e delega
        function runTrim(clickPt) {
            const threshold = 12 / zoom;

            // Testa arcos e círculos (shapes diretos)
            let curvedShape = null, minCurved = threshold;
            shapes.forEach(shape => {
                if (shape instanceof Arc || shape instanceof Circle) {
                    const d = shape.distanceToPoint(clickPt);
                    if (d < minCurved) { minCurved = d; curvedShape = shape; }
                }
            });

            // Testa segmentos de linha/polyline
            let segmentToTrim = null, minSeg = threshold;
            getAllPhysicalSegments().forEach(seg => {
                const d = seg.distanceToPoint(clickPt);
                if (d < minSeg) { minSeg = d; segmentToTrim = seg; }
            });

            // Escolhe o mais próximo
            if (segmentToTrim && minSeg <= minCurved) {
                runTrimLine(segmentToTrim, clickPt);
            } else if (curvedShape instanceof Circle) {
                runTrimCircle(curvedShape, clickPt);
            } else if (curvedShape instanceof Arc) {
                runTrimArcShape(curvedShape, clickPt);
            }
        }

        // EXTEND - estende objetos até os limites selecionados
        function runExtend(clickPt) {
            const threshold = 12 / zoom;

            // Encontra o shape clicado (linha ou polyline)
            let shapeToExtend = null;
            let minDist = threshold;
            let isSegment = false;
            let segmentIndex = -1;

            // Testa linhas diretas
            shapes.forEach(shape => {
                if (extendBoundaries.some(b => b.id === shape.id)) return;
                if (shape instanceof Line) {
                    const d = shape.distanceToPoint(clickPt);
                    if (d < minDist) {
                        minDist = d;
                        shapeToExtend = shape;
                        isSegment = true;
                    }
                }
            });

            // Testa segmentos de polyline
            shapes.forEach(shape => {
                if (extendBoundaries.some(b => b.id === shape.id)) return;
                if (shape instanceof Polyline) {
                    for (let i = 0; i < shape.points.length - 1; i++) {
                        const seg = new Line(shape.points[i], shape.points[i + 1]);
                        const d = seg.distanceToPoint(clickPt);
                        if (d < minDist) {
                            minDist = d;
                            shapeToExtend = shape;
                            isSegment = false;
                            segmentIndex = i;
                        }
                    }
                }
            });

            // Testa arcos
            shapes.forEach(shape => {
                if (extendBoundaries.some(b => b.id === shape.id)) return;
                if (shape instanceof Arc && shape.valid) {
                    const d = shape.distanceToPoint(clickPt);
                    if (d < minDist) {
                        minDist = d;
                        shapeToExtend = shape;
                    }
                }
            });

            if (!shapeToExtend) return;

            // Coletar todos os segmentos dos limites
            let boundarySegments = [];
            extendBoundaries.forEach(boundary => {
                if (boundary instanceof Line) {
                    boundarySegments.push(boundary);
                } else if (boundary instanceof Polyline) {
                    for (let i = 0; i < boundary.points.length - 1; i++) {
                        boundarySegments.push(new Line(boundary.points[i], boundary.points[i + 1]));
                    }
                } else if (boundary instanceof Arc && boundary.valid) {
                    // Para arcos/círculos, usar aproximação por segmentos
                    for (let a = 0; a < 2 * Math.PI; a += Math.PI / 12) {
                        const p1 = new Point(boundary.center.x + boundary.radius * Math.cos(a),
                                            boundary.center.y + boundary.radius * Math.sin(a));
                        const p2 = new Point(boundary.center.x + boundary.radius * Math.cos(a + Math.PI / 12),
                                            boundary.center.y + boundary.radius * Math.sin(a + Math.PI / 12));
                        boundarySegments.push(new Line(p1, p2));
                    }
                }
            });

            if (boundarySegments.length === 0) return;

            if (shapeToExtend instanceof Line) {
                runExtendLine(shapeToExtend, clickPt, boundarySegments);
            } else if (shapeToExtend instanceof Arc && shapeToExtend.valid) {
                runExtendArc(shapeToExtend, clickPt, boundarySegments);
            } else if (shapeToExtend instanceof Polyline && segmentIndex >= 0) {
                runExtendPolylineSegment(shapeToExtend, segmentIndex, clickPt, boundarySegments);
            }
        }

        function runExtendLine(lineToExtend, clickPt, boundarySegments) {
            const distToP1 = lineToExtend.p1.distanceTo(clickPt);
            const distToP2 = lineToExtend.p2.distanceTo(clickPt);
            const endpointToMove = distToP1 < distToP2 ? lineToExtend.p1 : lineToExtend.p2;
            const endpointToKeep = distToP1 < distToP2 ? lineToExtend.p2 : lineToExtend.p1;

            const dirX = endpointToMove.x - endpointToKeep.x;
            const dirY = endpointToMove.y - endpointToKeep.y;
            const dirLen = Math.hypot(dirX, dirY);
            if (dirLen < 0.01) return;
            const dirNX = dirX / dirLen;
            const dirNY = dirY / dirLen;

            const extStart = new Point(endpointToKeep.x - dirX * 100, endpointToKeep.y - dirY * 100);
            const extEnd = new Point(endpointToKeep.x + dirX * 100, endpointToKeep.y + dirY * 100);

            let bestInter = null;
            let bestDist = Infinity;

            for (const boundary of boundarySegments) {
                const inter = findLineIntersection(extStart, extEnd, boundary.p1, boundary.p2, true);
                if (!inter) continue;

                const proj = (inter.x - endpointToKeep.x) * dirNX + (inter.y - endpointToKeep.y) * dirNY;
                
                if (proj > dirLen * 0.99) {
                    const dist = endpointToMove.distanceTo(inter);
                    if (dist < bestDist) {
                        bestDist = dist;
                        bestInter = inter;
                    }
                }
            }

            if (bestInter) {
                if (distToP1 < distToP2) {
                    lineToExtend.p1 = bestInter;
                } else {
                    lineToExtend.p2 = bestInter;
                }
            }
        }

        function runExtendArc(arcToExtend, clickPt, boundarySegments) {
            const distToP1 = arcToExtend.p1.distanceTo(clickPt);
            const distToP2 = arcToExtend.p2.distanceTo(clickPt);
            const endpointToMove = distToP1 < distToP2 ? arcToExtend.p1 : arcToExtend.p2;
            const isP1 = distToP1 < distToP2;

            const center = arcToExtend.center;
            const radius = arcToExtend.radius;
            if (radius < 0.01) return;

            const ccw = arcToExtend.counterClockwise;
            const moveAngle = normalizeAngle(Math.atan2(endpointToMove.y - center.y, endpointToMove.x - center.x));

            // Buscar interseções com o círculo de MESMO centro/raio
            let bestAngle = null;
            let bestDist = Infinity;

            for (const boundary of boundarySegments) {
                const inters = lineCircleIntersections(boundary.p1, boundary.p2, center, radius);
                for (const inter of inters) {
                    const angle = normalizeAngle(Math.atan2(inter.y - center.y, inter.x - center.x));
                    if (angle === moveAngle) continue; // mesmo ponto

                    // Direção de extensão:
                    // p1 (início): estender para TRÁS (antes do startAngle)
                    // p2 (fim): estender para FRENTE (depois do endAngle)
                    let extendDist;
                    if (isP1) {
                        extendDist = ccw
                            ? normalizeAngle(moveAngle - angle)
                            : normalizeAngle(angle - moveAngle);
                    } else {
                        extendDist = ccw
                            ? normalizeAngle(angle - moveAngle)
                            : normalizeAngle(moveAngle - angle);
                    }

                    if (extendDist > 0.02 && extendDist < Math.PI * 1.8) {
                        const arcDist = radius * extendDist;
                        if (arcDist < bestDist) {
                            bestDist = arcDist;
                            bestAngle = angle;
                        }
                    }
                }
            }

            if (bestAngle !== null) {
                const newEndpoint = new Point(
                    center.x + radius * Math.cos(bestAngle),
                    center.y + radius * Math.sin(bestAngle)
                );

                // Calcular novo p3 no meio do arco estendido
                const otherEndpoint = isP1 ? arcToExtend.p2 : arcToExtend.p1;
                const otherAngle = normalizeAngle(Math.atan2(otherEndpoint.y - center.y, otherEndpoint.x - center.x));
                const newStart = isP1 ? bestAngle : otherAngle;
                const newEnd = isP1 ? otherAngle : bestAngle;

                let midAngle;
                if (ccw) {
                    midAngle = normalizeAngle(newStart + normalizeAngle(newEnd - newStart) / 2);
                } else {
                    midAngle = normalizeAngle(newEnd + normalizeAngle(newStart - newEnd) / 2);
                }
                const newP3 = new Point(
                    center.x + radius * Math.cos(midAngle),
                    center.y + radius * Math.sin(midAngle)
                );

                // Atualizar os pontos
                if (isP1) {
                    arcToExtend.p1 = newEndpoint;
                } else {
                    arcToExtend.p2 = newEndpoint;
                }
                arcToExtend.p3 = newP3;

                // NÃO chamar _compute()! Manter centro/raio originais
                // Atualizar startAngle/endAngle manualmente
                arcToExtend.startAngle = normalizeAngle(Math.atan2(arcToExtend.p1.y - center.y, arcToExtend.p1.x - center.x));
                arcToExtend.endAngle = normalizeAngle(Math.atan2(arcToExtend.p2.y - center.y, arcToExtend.p2.x - center.x));
            }
        }

        function runExtendPolylineSegment(polyline, segmentIndex, clickPt, boundarySegments) {
            const pA = polyline.points[segmentIndex];
            const pB = polyline.points[segmentIndex + 1];
            
            // Cria Line temporário com referências diretas
            const tempLine = new Line(pA, pB);
            runExtendLine(tempLine, clickPt, boundarySegments);
            
            // Verifica qual endpoint foi substituído e atualiza a polyline
            // Compara por valor (não referência)
            if (Math.abs(tempLine.p1.x - pA.x) > 0.01 || Math.abs(tempLine.p1.y - pA.y) > 0.01) {
                polyline.points[segmentIndex] = tempLine.p1;
            }
            if (Math.abs(tempLine.p2.x - pB.x) > 0.01 || Math.abs(tempLine.p2.y - pB.y) > 0.01) {
                polyline.points[segmentIndex + 1] = tempLine.p2;
            }
        }

        function runOffset(shape, clickPt, distance) {
            if (!shape || !(shape instanceof Line)) return;
            let dx = shape.p2.x - shape.p1.x; let dy = shape.p2.y - shape.p1.y; let len = Math.hypot(dx, dy);
            let nx = -dy / len; let ny = dx / len;
            let lineA = new Line(new Point(shape.p1.x + nx * distance, shape.p1.y + ny * distance), new Point(shape.p2.x + nx * distance, shape.p2.y + ny * distance));
            let lineB = new Line(new Point(shape.p1.x - nx * distance, shape.p1.y - ny * distance), new Point(shape.p2.x - nx * distance, shape.p2.y - ny * distance));
            if (lineA.distanceToPoint(clickPt) < lineB.distanceToPoint(clickPt)) shapes.push(lineA); else shapes.push(lineB);
        }

        function applyMoveMultiple(items, base, target) {
            let dx = target.x - base.x; let dy = target.y - base.y;
            items.forEach(shape => {
                if (shape instanceof Line) { shape.p1.x += dx; shape.p1.y += dy; shape.p2.x += dx; shape.p2.y += dy; }
                else if (shape instanceof Circle) { shape.center.x += dx; shape.center.y += dy; }
                else if (shape instanceof Polyline) { shape.points.forEach(p => { p.x += dx; p.y += dy; }); }
                else if (shape instanceof Arc) {
                    shape.p1.x += dx; shape.p1.y += dy;
                    shape.p2.x += dx; shape.p2.y += dy;
                    shape.p3.x += dx; shape.p3.y += dy;
                    shape._compute();
                }
            });
        }

        // Cria cópia de um shape (retorna novo objeto com coordenadas deslocadas)
        function copyShape(shape, dx, dy) {
            if (shape instanceof Line) {
                return new Line(new Point(shape.p1.x + dx, shape.p1.y + dy), new Point(shape.p2.x + dx, shape.p2.y + dy));
            } else if (shape instanceof Circle) {
                return new Circle(new Point(shape.center.x + dx, shape.center.y + dy), shape.radius);
            } else if (shape instanceof Polyline) {
                return new Polyline(shape.points.map(p => new Point(p.x + dx, p.y + dy)));
            } else if (shape instanceof Arc) {
                const p1 = new Point(shape.p1.x + dx, shape.p1.y + dy);
                const p2 = new Point(shape.p2.x + dx, shape.p2.y + dy);
                const p3 = new Point(shape.p3.x + dx, shape.p3.y + dy);
                return new Arc(p1, p3, p2);
            }
            return null;
        }

        function applyCopyMultiple(items, base, target) {
            let dx = target.x - base.x; let dy = target.y - base.y;
            items.forEach(shape => {
                const copied = copyShape(shape, dx, dy);
                if (copied) shapes.push(copied);
            });
        }

        // Reflete um ponto sobre o eixo definido por axisP1→axisP2
        function mirrorPoint(pt, axisP1, axisP2) {
            const dx = axisP2.x - axisP1.x, dy = axisP2.y - axisP1.y;
            const len2 = dx*dx + dy*dy;
            if (len2 < 1e-12) return new Point(pt.x, pt.y);
            const t = ((pt.x - axisP1.x)*dx + (pt.y - axisP1.y)*dy) / len2;
            const fx = axisP1.x + t*dx, fy = axisP1.y + t*dy;
            return new Point(2*fx - pt.x, 2*fy - pt.y);
        }

        // Rotaciona um ponto em torno de um centro
        function rotatePoint(pt, center, angle) {
            const cosA = Math.cos(angle);
            const sinA = Math.sin(angle);
            const dx = pt.x - center.x;
            const dy = pt.y - center.y;
            return new Point(
                center.x + dx * cosA - dy * sinA,
                center.y + dx * sinA + dy * cosA
            );
        }

        // Cria uma cópia rotacionada de um shape
        function rotateShape(shape, center, angle) {
            const rp = pt => rotatePoint(pt, center, angle);
            if (shape instanceof Line) {
                return new Line(rp(shape.p1), rp(shape.p2));
            } else if (shape instanceof Circle) {
                return new Circle(rp(shape.center), shape.radius);
            } else if (shape instanceof Polyline) {
                return new Polyline(shape.points.map(rp));
            } else if (shape instanceof Arc) {
                const mp1 = rp(shape.p1), mp2 = rp(shape.p2), mp3 = rp(shape.p3);
                return new Arc(mp1, mp3, mp2);
            }
            return null;
        }

        // Cria cópia rotacionada de todos os shapes selecionados
        function applyRotateMultiple(items, center, angle) {
            items.forEach(shape => {
                const rotated = rotateShape(shape, center, angle);
                if (rotated) shapes.push(rotated);
            });
        }

        // Rotaciona shapes in-place (para Move mode)
        function rotateShapesInPlace(items, center, angle) {
            items.forEach(shape => {
                if (shape instanceof Line) {
                    shape.p1 = rotatePoint(shape.p1, center, angle);
                    shape.p2 = rotatePoint(shape.p2, center, angle);
                } else if (shape instanceof Circle) {
                    shape.center = rotatePoint(shape.center, center, angle);
                } else if (shape instanceof Polyline) {
                    shape.points = shape.points.map(p => rotatePoint(p, center, angle));
                } else if (shape instanceof Arc) {
                    shape.p1 = rotatePoint(shape.p1, center, angle);
                    shape.p2 = rotatePoint(shape.p2, center, angle);
                    shape.p3 = rotatePoint(shape.p3, center, angle);
                    shape._compute();
                }
            });
        }

        // Cria uma cópia espelhada de um shape (não destrói o original)
        function mirrorShape(shape, axisP1, axisP2) {
            const mp = pt => mirrorPoint(pt, axisP1, axisP2);
            if (shape instanceof Line) {
                return new Line(mp(shape.p1), mp(shape.p2));
            } else if (shape instanceof Circle) {
                return new Circle(mp(shape.center), shape.radius);
            } else if (shape instanceof Polyline) {
                return new Polyline(shape.points.map(mp));
            } else if (shape instanceof Arc) {
                // Reflexão inverte a orientação: p1↔p1, p2↔p2, p3↔p3
                // Após reflexão, a direção do arco fica invertida, por isso trocamos p1/p2
                const mp1 = mp(shape.p1), mp2 = mp(shape.p2), mp3 = mp(shape.p3);
                return new Arc(mp2, mp3, mp1); // troca endpoints para preservar curvatura
            }
            return null;
        }

        function applyMirror(items, axisP1, axisP2) {
            items.forEach(shape => {
                const mirrored = mirrorShape(shape, axisP1, axisP2);
                if (mirrored) shapes.push(mirrored);
            });
        }

        // --- 6. KEYDOWN INTERCEPTOR (ENTERS / ESC) ---
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (currentMode === 'polyline' && currentPoints.length > 1) {
                    shapes.push(new Polyline(currentPoints));
                }
                resetState(); return;
            }
            // Shift+T: limpar pontos de OTrack manualmente
            if (e.key === 'T' && e.shiftKey) {
                OTRACK.clear();
                trackedPoints = [];
                drawEverything();
                return;
            }
            if (e.key === 'Enter') {
                // Se estiver desenhando uma polyline, finaliza injetando os pontos acumulados
                if (currentMode === 'polyline' && currentPoints.length > 1) {
                    shapes.push(new Polyline(currentPoints));
                    resetState(); return;
                }
                // Se estiver no MOVE e apertar Enter após selecionar, avança de fase
                if (currentMode === 'move' && selectionPhase === 'select' && selectedShapes.length > 0) {
                    selectionPhase = "basepoint";
                    updateInstructions(); drawEverything(); return;
                }
                // Se estiver no MIRROR e apertar Enter após selecionar, avança de fase
                if (currentMode === 'mirror' && selectionPhase === 'select' && selectedShapes.length > 0) {
                    selectionPhase = "axis1";
                    updateInstructions(); drawEverything(); return;
                }
                // Se estiver no COPY e apertar Enter após selecionar, avança de fase
                if (currentMode === 'copy' && selectionPhase === 'select' && selectedShapes.length > 0) {
                    selectionPhase = "basepoint";
                    updateInstructions(); drawEverything(); return;
                }
                // Se estiver no COPY e apertar Enter após cópia, finaliza
                if (currentMode === 'copy' && selectionPhase === 'target') {
                    clearSelection(); resetState(); return;
                }
                // Se estiver no ROTATE e apertar Enter após selecionar, avança
                if (currentMode === 'rotate' && selectionPhase === 'select' && selectedShapes.length > 0) {
                    selectionPhase = 'basepoint';
                    updateInstructions(); drawEverything(); return;
                }
                // Se estiver no ROTATE e apertar Enter após rotação, finaliza
                if (currentMode === 'rotate' && selectionPhase === 'target') {
                    clearSelection(); resetState(); return;
                }
                // Se estiver no EXTEND e apertar Enter após selecionar limites, avança
                if (currentMode === 'extend' && extendPhase === 'boundary') {
                    extendPhase = 'select';
                    updateInstructions(); drawEverything(); return;
                }
                // Se estiver no EXTEND e apertar Enter, finaliza
                if (currentMode === 'extend' && extendPhase === 'select') {
                    extendBoundaries = [];
                    extendPhase = 'boundary';
                    resetState(); return;
                }
                processCommand(); return;
            }
            if (document.activeElement !== coordInput && e.key.match(/[0-9.,-]/)) coordInput.focus();
        });

        function processCommand() {
            let val = coordInput.value.trim(); coordInput.value = ''; coordInput.blur();
            if (!val) return;

            if (currentMode === 'offset' && !isNaN(parseFloat(val))) {
                offsetDistance = Math.abs(parseFloat(val)); updateInstructions(); return;
            }

            // Rotate: digitar graus
            if (currentMode === 'rotate' && selectionPhase === 'target' && rotateBasePoint && !isNaN(parseFloat(val))) {
                const degrees = parseFloat(val);
                const angle = degrees * Math.PI / 180;
                applyRotateMultiple(selectedShapes, rotateBasePoint, angle);
                rotateBasePoint = null; // resetar para permitir nova rotação
                updateInstructions(); drawEverything(); return;
            }

            if (!val.includes(',')) {
                let dist = parseFloat(val); if (isNaN(dist)) return;
                let basePt = currentPoints.length > 0 ? currentPoints[currentPoints.length - 1] : null;
                if (!basePt && currentMode === 'move' && moveBasePoint) basePt = moveBasePoint;
                if (!basePt && currentMode === 'copy' && copyBasePoint) basePt = copyBasePoint;

                if (basePt) {
                    let angle;
                    if (currentPolarAngle !== null) {
                        angle = currentPolarAngle;
                    } else if (currentMode === 'polyline' && currentPoints.length >= 2) {
                        const prevPt = currentPoints[currentPoints.length - 2];
                        angle = Math.atan2(basePt.y - prevPt.y, basePt.x - prevPt.x);
                    } else {
                        let dx = computedPt.x - basePt.x;
                        let dy = computedPt.y - basePt.y;
                        if (Math.abs(dx) < 0.01 && Math.abs(dy) < 0.01) {
                            angle = 0;
                        } else {
                            angle = Math.atan2(dy, dx);
                        }
                    }
                    let targetPt = new Point(basePt.x + dist * Math.cos(angle), basePt.y + dist * Math.sin(angle));

                    if (currentMode === 'move' && selectionPhase === 'target') {
                        applyMoveMultiple(selectedShapes, moveBasePoint, targetPt); clearSelection(); resetState();
                    } else if (currentMode === 'copy' && selectionPhase === 'target') {
                        applyCopyMultiple(selectedShapes, copyBasePoint, targetPt);
                        copyBasePoint = targetPt;
                        updateInstructions(); drawEverything();
                    } else {
                        addPointToCreation(targetPt);
                    }
                }
            } else {
                let parts = val.split(','); let x = parseFloat(parts[0]); let y = parseFloat(parts[1]);
                if (!isNaN(x) && !isNaN(y)) addPointToCreation(new Point(x, -y));
            }
        }

        // --- 7. FLUXO DO MOUSE ---
        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 1) { 
                isPanning = true; startPan = { x: e.clientX - panX, y: e.clientY - panY }; e.preventDefault(); return;
            }
            if (e.button !== 0) return;

            // Coleta posição com snap ativo nas fases devidas, ou livre
            const snapClickModel = new Point(computedPt.x, computedPt.y);
            const pureModelMouse = screenToModel(screenMousePos);

            // FLUXO DO MOVE ATUALIZADO (Separado por fases explícitas)
            if (currentMode === 'move') {
                if (selectionPhase === "select") {
                    let clickedShape = getShapeUnderMouse(pureModelMouse);
                    if (clickedShape) {
                        if (!selectedShapes.some(s => s.id === clickedShape.id)) selectedShapes.push(clickedShape);
                        document.getElementById('select-count').innerText = selectedShapes.length;
                    } else {
                        // Caixa de seleção no vazio
                        isSelectingBox = true; selectionStartPt = pureModelMouse;
                    }
                    updateInstructions(); drawEverything(); return;
                }
                else if (selectionPhase === "basepoint") {
                    // Aqui o snap funciona 100% para pegar pontas/meios dos elementos!
                    moveBasePoint = snapClickModel; 
                    selectionPhase = "target";
                    updateInstructions(); drawEverything(); return;
                }
                else if (selectionPhase === "target") {
                    applyMoveMultiple(selectedShapes, moveBasePoint, snapClickModel);
                    clearSelection(); resetState(); return;
                }
            }

            // FLUXO DO MIRROR
            if (currentMode === 'mirror') {
                if (selectionPhase === 'select') {
                    const clickedShape = getShapeUnderMouse(pureModelMouse);
                    if (clickedShape) {
                        if (!selectedShapes.some(s => s.id === clickedShape.id)) selectedShapes.push(clickedShape);
                        document.getElementById('select-count').innerText = selectedShapes.length;
                    } else {
                        isSelectingBox = true; selectionStartPt = pureModelMouse;
                    }
                    updateInstructions(); drawEverything(); return;
                } else if (selectionPhase === 'axis1') {
                    mirrorAxisP1 = snapClickModel;
                    selectionPhase = 'axis2';
                    updateInstructions(); drawEverything(); return;
                } else if (selectionPhase === 'axis2') {
                    applyMirror(selectedShapes, mirrorAxisP1, snapClickModel);
                    mirrorAxisP1 = null;
                    clearSelection(); resetState(); return;
                }
            }

            // FLUXO DO COPY (igual ao Move, mas mantém originais)
            if (currentMode === 'copy') {
                if (selectionPhase === 'select') {
                    const clickedShape = getShapeUnderMouse(pureModelMouse);
                    if (clickedShape) {
                        if (!selectedShapes.some(s => s.id === clickedShape.id)) selectedShapes.push(clickedShape);
                        document.getElementById('select-count').innerText = selectedShapes.length;
                    } else {
                        isSelectingBox = true; selectionStartPt = pureModelMouse;
                    }
                    updateInstructions(); drawEverything(); return;
                } else if (selectionPhase === 'basepoint') {
                    copyBasePoint = snapClickModel;
                    selectionPhase = 'target';
                    updateInstructions(); drawEverything(); return;
                } else if (selectionPhase === 'target') {
                    applyCopyMultiple(selectedShapes, copyBasePoint, snapClickModel);
                    // NAO limpa seleção - permite múltiplas cópias consecutivas
                    copyBasePoint = snapClickModel; // novo ponto base = destino (copy multiple)
                    updateInstructions(); drawEverything(); return;
                }
            }

            // FLUXO DO ROTATE
            if (currentMode === 'rotate') {
                if (selectionPhase === 'select') {
                    const clickedShape = getShapeUnderMouse(pureModelMouse);
                    if (clickedShape) {
                        if (!selectedShapes.some(s => s.id === clickedShape.id)) selectedShapes.push(clickedShape);
                        document.getElementById('select-count').innerText = selectedShapes.length;
                    } else {
                        isSelectingBox = true; selectionStartPt = pureModelMouse;
                    }
                    updateInstructions(); drawEverything(); return;
                } else if (selectionPhase === 'basepoint') {
                    rotateBasePoint = snapClickModel;
                    selectionPhase = 'target';
                    updateInstructions(); drawEverything(); return;
                } else if (selectionPhase === 'target') {
                    // Calcula ângulo de rotação
                    const angle = Math.atan2(snapClickModel.y - rotateBasePoint.y, snapClickModel.x - rotateBasePoint.x);
                    applyRotateMultiple(selectedShapes, rotateBasePoint, angle);
                    // Permite múltiplas rotações consecutivas
                    rotateBasePoint = snapClickModel;
                    updateInstructions(); drawEverything(); return;
                }
            }

            // FLUXO DO EXTEND
            if (currentMode === 'extend') {
                if (extendPhase === 'boundary') {
                    // Seleciona limites (objetos que serão usados como referência)
                    const clickedShape = getShapeUnderMouse(pureModelMouse);
                    if (clickedShape) {
                        if (!extendBoundaries.some(s => s.id === clickedShape.id)) extendBoundaries.push(clickedShape);
                    } else {
                        // Caixa de seleção para limites
                        isSelectingBox = true; selectionStartPt = pureModelMouse;
                    }
                    updateInstructions(); drawEverything(); return;
                } else {
                    // Fase de estender: clica no objeto a estender
                    runExtend(pureModelMouse);
                    drawEverything(); return;
                }
            }

            // OUTROS MODOS DE EDICÃO
            if (currentMode === 'delete') {
                let clickedShape = getShapeUnderMouse(pureModelMouse);
                if (clickedShape) {
                    shapes = shapes.filter(s => s.id !== clickedShape.id);
                } else {
                    isSelectingBox = true; selectionStartPt = pureModelMouse;
                }
                drawEverything(); return;
            }
            if (currentMode === 'trim') { runTrim(pureModelMouse); drawEverything(); return; }
            if (currentMode === 'offset') {
                let s = getShapeUnderMouse(pureModelMouse);
                if (s) runOffset(s, pureModelMouse, offsetDistance);
                drawEverything(); return;
            }

            // MODOS DE DESENHO
            if (['line', 'polyline', 'circle', 'arc'].includes(currentMode)) {
                addPointToCreation(snapClickModel);
            }
        });

        canvas.addEventListener('mouseup', (e) => { 
            if (e.button === 1) isPanning = false; 
            if (e.button === 0 && isSelectingBox) {
                isSelectingBox = false;
                executeBoxSelection(selectionStartPt, screenToModel(screenMousePos));
                selectionStartPt = null; updateInstructions(); drawEverything();
            }
        });

        function addPointToCreation(pt) {
            if (currentMode === 'line') {
                if (currentPoints.length === 0) currentPoints.push(pt);
                else {
                    shapes.push(new Line(currentPoints[0], pt));
                    currentPoints = [pt]; // Mantém endpoint como base do próximo segmento
                }
            } else if (currentMode === 'polyline') {
                currentPoints.push(pt);
            } else if (currentMode === 'circle') {
                if (currentPoints.length === 0) currentPoints.push(pt);
                else { shapes.push(new Circle(currentPoints[0], currentPoints[0].distanceTo(pt))); currentPoints = []; }
            } else if (currentMode === 'arc') {
                currentPoints.push(pt);
                if (currentPoints.length === 3) {
                    const arc = new Arc(currentPoints[0], currentPoints[2], currentPoints[1]);
                    if (arc.valid) shapes.push(arc);
                    currentPoints = [];
                }
            }
            drawEverything();
        }

        // --- 8. UI & RENDER ---
        function setMode(mode) {
            currentMode = mode; resetState();
            document.querySelectorAll('#toolbar button').forEach(b => b.classList.remove('active'));
            if(document.getElementById(`btn-${mode}`)) document.getElementById(`btn-${mode}`).classList.add('active');
            document.getElementById('mode-display').innerText = mode.toUpperCase();
            updateInstructions(); drawEverything();
        }

        function resetState() {
            currentPoints = []; moveBasePoint = null; mirrorAxisP1 = null; copyBasePoint = null; rotateBasePoint = null; isSelectingBox = false; selectionPhase = "select";
            extendBoundaries = []; extendPhase = "boundary";
            OTRACK.clear();
            trackedPoints = [];
            updateInstructions(); drawEverything();
        }

        function clearCanvas() { shapes = []; selectedShapes = []; clearSelection(); resetState(); }

        function serializeShape(shape) {
            if (shape instanceof Line) {
                return { type: 'line', p1: { x: shape.p1.x, y: shape.p1.y }, p2: { x: shape.p2.x, y: shape.p2.y } };
            } else if (shape instanceof Circle) {
                return { type: 'circle', center: { x: shape.center.x, y: shape.center.y }, radius: shape.radius };
            } else if (shape instanceof Polyline) {
                return { type: 'polyline', points: shape.points.map(p => ({ x: p.x, y: p.y })) };
            } else if (shape instanceof Arc) {
                return { type: 'arc', p1: { x: shape.p1.x, y: shape.p1.y }, p2: { x: shape.p2.x, y: shape.p2.y }, p3: { x: shape.p3.x, y: shape.p3.y } };
            }
            return null;
        }

        function deserializeShape(data) {
            if (data.type === 'line') {
                return new Line(new Point(data.p1.x, data.p1.y), new Point(data.p2.x, data.p2.y));
            } else if (data.type === 'circle') {
                return new Circle(new Point(data.center.x, data.center.y), data.radius);
            } else if (data.type === 'polyline') {
                return new Polyline(data.points.map(p => new Point(p.x, p.y)));
            } else if (data.type === 'arc') {
                return new Arc(new Point(data.p1.x, data.p1.y), new Point(data.p3.x, data.p3.y), new Point(data.p2.x, data.p2.y));
            }
            return null;
        }

        function saveDrawing() {
            const data = {
                version: '1.0',
                shapes: shapes.map(s => serializeShape(s)),
                zoom: zoom,
                panX: panX,
                panY: panY
            };
            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `traceline_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function loadDrawing() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        shapes = [];
                        selectedShapes = [];
                        if (data.shapes && Array.isArray(data.shapes)) {
                            data.shapes.forEach(s => {
                                const shape = deserializeShape(s);
                                if (shape) shapes.push(shape);
                            });
                        }
                        if (data.zoom) zoom = data.zoom;
                        if (data.panX !== undefined) panX = data.panX;
                        if (data.panY !== undefined) panY = data.panY;
                        clearSelection();
                        resetState();
                        drawEverything();
                    } catch (err) {
                        alert('Erro ao carregar arquivo: ' + err.message);
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function updateInstructions() {
            let inst = ""; let lbl = "Distância / Coord:";
            if (currentMode === 'line' || currentMode === 'circle') inst = "Clique na tela para iniciar o desenho gráfico.";
            else if (currentMode === 'polyline') inst = "Clique nos pontos consecutivos. Aperte ENTER para finalizar a Polyline.";
            else if (currentMode === 'arc') {
                if (currentPoints.length === 0) inst = "[Arco 1/3] Clique no PONTO INICIAL do arco.";
                else if (currentPoints.length === 1) inst = "[Arco 2/3] Clique no PONTO FINAL do arco.";
                else inst = "[Arco 3/3] Clique em um ponto intermediário para definir a curvatura.";
            }
